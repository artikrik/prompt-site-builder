name: Self-Hosted Runner Setup

on:
  workflow_dispatch:

jobs:
  setup:
    name: Setup Self-Hosted Runner
    runs-on: ubuntu-latest
    steps:
      - name: Print setup instructions
        run: |
          echo "============================================"
          echo "Self-Hosted Runner Setup Instructions"
          echo "============================================"
          echo ""
          echo "1. On your Ubuntu server, run:"
          echo "   mkdir actions-runner && cd actions-runner"
          echo "   curl -o actions-runner-linux-x64-2.321.0.tar.gz -L https://github.com/actions/runner/releases/download/v2.321.0/actions-runner-linux-x64-2.321.0.tar.gz"
          echo "   tar xzf actions-runner-linux-x64-2.321.0.tar.gz"
          echo ""
          echo "2. Configure the runner:"
          echo "   ./config.sh --url https://github.com/YOUR_ORG/YOUR_REPO --token YOUR_TOKEN"
          echo ""
          echo "3. Install as a service:"
          echo "   sudo ./svc.sh install"
          echo "   sudo ./svc.sh start"
          echo ""
          echo "4. Required software on the server:"
          echo "   - Docker & Docker Compose"
          echo "   - Hugo (extended)"
          echo "   - Node.js 20+"
          echo "   - PostgreSQL 16"
          echo "   - Redis 7"
          echo "============================================"
