name: Self-Hosted Runner Setup

on:
  workflow_dispatch:

jobs:
  setup:
    name: Setup Self-Hosted Runner
    runs-on: ubuntu-latest
    steps:
      - name: Print setup instructions
        run: |
          echo "============================================"
          echo "Self-Hosted Runner Setup Instructions"
          echo "============================================"
          echo ""
          echo "Server: 192.168.31.22 (Ubuntu 24.04)"
          echo "User:  redage"
          echo "Repo:  artikrik/prompt-site-builder"
          echo ""
          echo "1. Copy setup script to server:"
          echo "   scp scripts/server-setup.sh redage@192.168.31.22:~/"
          echo ""
          echo "2. On server, run setup as root:"
          echo "   ssh redage@192.168.31.22"
          echo "   sudo ./server-setup.sh"
          echo ""
          echo "3. Get runner token:"
          echo "   gh api repos/artikrik/prompt-site-builder/actions/runners/registration-token --method POST --jq '.token'"
          echo ""
          echo "4. On server, configure runner:"
          echo "   cd /opt/actions-runner"
          echo "   ./config.sh --url https://github.com/artikrik/prompt-site-builder --token TOKEN --name ubuntu-server --labels self-hosted,production --unattended --replace"
          echo "   sudo ./svc.sh install"
          echo "   sudo ./svc.sh start"
          echo ""
          echo "5. Create production .env:"
          echo "   vim /opt/prompt-site-builder/.env"
          echo ""
          echo "6. Push to main -> auto-deploy triggers"
          echo ""
          echo "Status check:"
          echo "   systemctl status actions.runner.*"
          echo "   gh api repos/artikrik/prompt-site-builder/actions/runners"
          echo "============================================"
