name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Sequential pipeline: each job depends on previous ──
  # Any failure skips all downstream jobs (fail-fast)

  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Clean root-owned files (Docker as root)
        run: |
          docker run --rm -v "$(pwd):/ws" alpine sh -c 'rm -rf /ws/docker /ws/var/www /ws/node_modules 2>/dev/null; true'

      - name: Git checkout (robust)
        run: |
          if [ -d .git ]; then
            git fetch --depth=1 origin "$GITHUB_SHA" 2>/dev/null || true
          else
            git init
            git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi
          git checkout -f "$GITHUB_SHA"
          rm -rf node_modules packages/*/dist apps/*/node_modules apps/*/.svelte-kit 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck-shared:
    name: Type Check (Shared)
    runs-on: self-hosted
    needs: [lint]
    steps:
      - name: Git checkout (robust)
        run: |
          if [ -d .git ]; then
            git fetch --depth=1 origin "$GITHUB_SHA" 2>/dev/null || true
          else
            git init
            git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi
          git checkout -f "$GITHUB_SHA"
          rm -rf node_modules packages/*/dist apps/*/node_modules apps/*/.svelte-kit 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace=packages/shared

  typecheck-backend:
    name: Type Check (Backend)
    runs-on: self-hosted
    needs: [typecheck-shared]
    steps:
      - name: Git checkout (robust)
        run: |
          if [ -d .git ]; then
            git fetch --depth=1 origin "$GITHUB_SHA" 2>/dev/null || true
          else
            git init
            git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi
          git checkout -f "$GITHUB_SHA"
          rm -rf node_modules packages/*/dist apps/*/node_modules apps/*/.svelte-kit 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npm run typecheck --workspace=apps/backend

  typecheck-frontend:
    name: Type Check (Frontend)
    runs-on: self-hosted
    needs: [typecheck-backend]
    steps:
      - name: Git checkout (robust)
        run: |
          if [ -d .git ]; then
            git fetch --depth=1 origin "$GITHUB_SHA" 2>/dev/null || true
          else
            git init
            git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi
          git checkout -f "$GITHUB_SHA"
          rm -rf node_modules packages/*/dist apps/*/node_modules apps/*/.svelte-kit 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npm run typecheck --workspace=apps/frontend

  test-backend:
    name: Backend Tests
    runs-on: self-hosted
    needs: [typecheck-frontend]
    env:
      DATABASE_URL: postgresql://promptsite:testpassword@localhost:5432/promptsite_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: test-secret-key-for-ci-environment-32chars
      JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-environment-32chars
      ANTHROPIC_API_KEY: test-key
      OPENAI_API_KEY: test-key
      APIFY_TOKEN: test-token
    steps:
      - name: Git checkout (robust)
        run: |
          if [ -d .git ]; then
            git fetch --depth=1 origin "$GITHUB_SHA" 2>/dev/null || true
          else
            git init
            git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi
          git checkout -f "$GITHUB_SHA"
          rm -rf node_modules packages/*/dist apps/*/node_modules apps/*/.svelte-kit 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Start PostgreSQL
        run: |
          docker rm -f pg-test 2>/dev/null || true
          docker run -d --name pg-test \
            -e POSTGRES_DB=promptsite_test \
            -e POSTGRES_USER=promptsite \
            -e POSTGRES_PASSWORD=testpassword \
            -p 5432:5432 \
            postgres:16-alpine
          for i in $(seq 1 20); do
            if docker exec pg-test pg_isready -U promptsite > /dev/null 2>&1; then
              echo "✅ PostgreSQL ready"
              break
            fi
            echo "⏳ Waiting for PostgreSQL ($i/20)..."
            sleep 1
          done

      - name: Start Redis
        run: |
          docker rm -f redis-test 2>/dev/null || true
          docker run -d --name redis-test \
            -p 6379:6379 \
            redis:7-alpine
          for i in $(seq 1 10); do
            if docker exec redis-test redis-cli ping | grep -q PONG; then
              echo "✅ Redis ready"
              break
            fi
            echo "⏳ Waiting for Redis ($i/10)..."
            sleep 1
          done

      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npx prisma generate --schema=apps/backend/prisma/schema.prisma
      - run: npx prisma migrate deploy --schema=apps/backend/prisma/schema.prisma
      - run: npm run test --workspace=apps/backend

      - name: Cleanup
        if: always()
        run: |
          docker rm -f pg-test redis-test 2>/dev/null || true

  test-frontend:
    name: Frontend Tests
    runs-on: self-hosted
    needs: [test-backend]
    steps:
      - name: Git checkout (robust)
        run: |
          if [ -d .git ]; then
            git fetch --depth=1 origin "$GITHUB_SHA" 2>/dev/null || true
          else
            git init
            git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi
          git checkout -f "$GITHUB_SHA"
          rm -rf node_modules packages/*/dist apps/*/node_modules apps/*/.svelte-kit 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npm run test --workspace=apps/frontend

  build:
    name: Build
    runs-on: self-hosted
    needs: [test-frontend]
    steps:
      - name: Git checkout (robust)
        run: |
          if [ -d .git ]; then
            git fetch --depth=1 origin "$GITHUB_SHA" 2>/dev/null || true
          else
            git init
            git remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi
          git checkout -f "$GITHUB_SHA"
          rm -rf node_modules packages/*/dist apps/*/node_modules apps/*/.svelte-kit 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
