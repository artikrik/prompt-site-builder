name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        type: boolean
        default: false

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

# Suppress Node.js 20 deprecation warnings (actions/checkout@v4, setup-node@v4)
# Remove when actions update to Node.js 24 runtime
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  # ═══════════════════════════════════════════════════════════
  #  Quality Gates (push, PR checks, workflow_dispatch)
  # ═══════════════════════════════════════════════════════════

  lint:
    name: Lint
    runs-on: self-hosted
    # Run on: push, workflow_dispatch, PR (open/sync/reopen), PR merged to main
    # Skip only: PR closed without merge
    timeout-minutes: 10
    env:
      TURBO_CACHE_DIR: /opt/prompt-site-builder/.turbo-cache
    steps:
      - name: Clean root-owned files (Docker residue)
        run: |
          docker run --rm -v "$(pwd):/ws" alpine sh -c 'rm -rf /ws/docker /ws/var /ws/node_modules 2>/dev/null; true'

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - run: npm ci

      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: self-hosted
    # Run on: push, workflow_dispatch, PR (open/sync/reopen), PR merged to main
    timeout-minutes: 10
    env:
      TURBO_CACHE_DIR: /opt/prompt-site-builder/.turbo-cache
    steps:
      - name: Clean root-owned files (Docker residue)
        run: |
          docker run --rm -v "$(pwd):/ws" alpine sh -c 'rm -rf /ws/docker /ws/var /ws/node_modules 2>/dev/null; true'

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npx prisma generate --schema=apps/backend/prisma/schema.prisma
      - run: npm run typecheck

  # ═══════════════════════════════════════════════════════════
  #  Tests (parallel — all quality gates run independently)
  # ═══════════════════════════════════════════════════════════

  test-backend:
    name: Backend Tests
    runs-on: self-hosted
    # Run on: PR (open/sync/reopen), workflow_dispatch. SKIP on push to main (only build+deploy).
    # Tests mock PrismaService — no real PostgreSQL/Redis needed.
    if: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    timeout-minutes: 10
    env:
      TURBO_CACHE_DIR: /opt/prompt-site-builder/.turbo-cache
      JWT_SECRET: test-secret-key-for-ci-environment-32chars
      JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-environment-32chars
      ANTHROPIC_API_KEY: test-key
      OPENAI_API_KEY: test-key
      APIFY_TOKEN: test-token
      FACEBOOK_ACCESS_TOKEN: test-facebook-token
      GOOGLE_MAPS_API_KEY: test-google-maps-key
      ENRICHMENT_AUTO_RUN: 'false'
      ENRICHMENT_DEFAULT_SOURCES: instagram,facebook,googleMaps
    steps:
      - name: Clean root-owned files (Docker residue)
        run: |
          docker run --rm -v "$(pwd):/ws" alpine sh -c 'rm -rf /ws/docker /ws/var /ws/node_modules 2>/dev/null; true'

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - run: npm ci

      - run: npm run build --workspace=packages/shared
      - run: npx prisma generate --schema=apps/backend/prisma/schema.prisma

      - name: Skip tests (manual override)
        if: ${{ inputs.skip_tests }}
        run: echo "⏭️ Backend tests skipped via workflow_dispatch skip_tests"

      - name: Run backend tests
        if: ${{ !inputs.skip_tests }}
        run: npm run test --workspace=apps/backend

  test-frontend:
    name: Frontend Tests
    runs-on: self-hosted
    # Run on: PR (open/sync/reopen), workflow_dispatch. SKIP on push to main (only build+deploy).
    if: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    timeout-minutes: 10
    env:
      TURBO_CACHE_DIR: /opt/prompt-site-builder/.turbo-cache
    steps:
      - name: Clean root-owned files (Docker residue)
        run: |
          docker run --rm -v "$(pwd):/ws" alpine sh -c 'rm -rf /ws/docker /ws/var /ws/node_modules 2>/dev/null; true'

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - name: Skip tests (manual override)
        if: ${{ inputs.skip_tests }}
        run: echo "⏭️ Frontend tests skipped via workflow_dispatch skip_tests"

      - name: Run frontend tests
        if: ${{ !inputs.skip_tests }}
        run: npm run test --workspace=apps/frontend

  # ═══════════════════════════════════════════════════════════
  #  Build + Deploy (PR merge to main or manual trigger)
  # ═══════════════════════════════════════════════════════════

  build:
    name: Build
    runs-on: self-hosted
    # Build runs after lint + typecheck (tests skipped on push to main)
    needs: [lint, typecheck]
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 15
    steps:
      - name: Clean root-owned files (Docker residue)
        run: |
          docker run --rm -v "$(pwd):/ws" alpine sh -c 'rm -rf /ws/docker /ws/var /ws/node_modules 2>/dev/null; true'

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3

      - run: npm ci

      - run: npm run build

  # ═══════════════════════════════════════════════════════════
  #  Deploy (on PR merge to main or manual trigger)
  # ═══════════════════════════════════════════════════════════

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: [build]
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    environment: production
    timeout-minutes: 30
    env:
      POSTGRES_PORT: "5433"
      REDIS_PORT: "6380"
      BACKEND_PORT: "3001"
      FRONTEND_PORT: "5174"
      CADDY_HTTP_PORT: "8080"
      CADDY_HTTPS_PORT: "8443"

    steps:
      - name: Clean root-owned files (Docker residue)
        run: |
          docker run --rm -v "$(pwd):/ws" alpine sh -c 'rm -rf /ws/docker /ws/var /ws/node_modules 2>/dev/null; true'

      - uses: actions/checkout@v4

      - name: Verify .env exists
        run: |
          ENV_FILE="/opt/prompt-site-builder/.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "❌ ERROR: .env file not found at $ENV_FILE"
            echo "Create it: cp /opt/prompt-site-builder/.env.example $ENV_FILE && vim $ENV_FILE"
            exit 1
          fi
          cp "$ENV_FILE" .env
          echo "✅ .env copied from $ENV_FILE"

      - name: Setup persistent directories
        run: |
          mkdir -p /opt/prompt-site-builder/var/www/client-sites
          mkdir -p /opt/prompt-site-builder/docker
          # Remove before copy — Docker may have created Caddyfile as a directory on failed mount
          rm -rf /opt/prompt-site-builder/docker/Caddyfile
          cp -f docker/Caddyfile /opt/prompt-site-builder/docker/Caddyfile
          echo "✅ Persistent dirs ready"

      - name: Verify Docker
        run: |
          docker --version
          docker compose version
          echo "✅ Docker ready"

      - name: Stop old containers
        run: |
          echo "🛑 Stopping old containers..."
          docker compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans || true

      - name: Build and start services
        run: |
          echo "🐳 Building images..."
          docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache 2>&1
          echo "🚀 Starting services..."
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --wait --wait-timeout 120

      - name: Dump backend logs on start failure
        if: failure()
        run: |
          echo "=== Backend Logs (last 100 lines) ==="
          docker compose logs backend --tail=100 2>&1 || echo "(no backend logs available)"
          echo "=== Container Status ==="
          docker compose ps 2>&1 || true

      - name: Run database migrations
        run: docker compose exec -T backend npx prisma migrate deploy

      - name: Health check — Backend
        run: |
          echo "🏥 Checking backend..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "✅ Backend healthy"
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "❌ Backend failed to start"
              docker compose logs backend --tail=50
              exit 1
            fi
            echo "⏳ Waiting ($i/12)..."
            sleep 5
          done

      - name: Health check — Frontend
        run: |
          echo "🏥 Checking frontend..."
          for i in $(seq 1 6); do
            if curl -sf http://localhost:5174/ > /dev/null 2>&1; then
              echo "✅ Frontend healthy"
              break
            fi
            if [ "$i" -eq 6 ]; then
              echo "❌ Frontend failed to start"
              docker compose logs frontend --tail=50
              exit 1
            fi
            echo "⏳ Waiting ($i/6)..."
            sleep 5
          done

      - name: Check Caddy
        run: |
          if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
            echo "✅ Caddy responding"
          else
            echo "⚠️ Caddy not responding (may need valid DNS)"
            docker compose logs caddy --tail=20
          fi

      - name: Cleanup old images
        if: always()
        run: docker image prune -f

      - name: Deploy Summary
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "  Deploy finished"
          echo "============================================"
          echo "  Dashboard:  https://sitenow.pp.ua"
          echo "  API:        https://api.sitenow.pp.ua"
          echo "  Server:     $(hostname) ($(hostname -I | awk '{print $1}'))"
          echo "  Time:       $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "============================================"

      - name: Clean root-owned files (post-job)
        if: always()
        run: |
          docker run --rm -v "$(pwd):/ws" alpine sh -c 'rm -rf /ws/docker /ws/var /ws/node_modules 2>/dev/null; true'
          echo "✅ Root-owned files cleaned"
