# Production overrides — avoid port conflicts with existing containers
# Uses relative paths (runner workspace) — no sudo needed

services:
  backend:
    ports:
      - "3001:3000"
    volumes:
      - ./var/www/client-sites:/var/www/client-sites

  frontend:
    ports:
      - "5174:5173"

  caddy:
    ports:
      - "8080:80"
      - "8443:443"
      - "8443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./var/www/client-sites:/var/www/client-sites:ro
