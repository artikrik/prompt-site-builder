# Production overrides — uses env vars for port customization
# Ports set via deploy.yml env: POSTGRES_PORT, REDIS_PORT, BACKEND_PORT, FRONTEND_PORT, CADDY_HTTP_PORT, CADDY_HTTPS_PORT

services:
  backend:
    volumes:
      - ./var/www/client-sites:/var/www/client-sites

  caddy:
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./var/www/client-sites:/var/www/client-sites:ro
