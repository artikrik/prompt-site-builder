# Production overrides — avoid port conflicts with existing containers

services:
  backend:
    ports:
      - "3001:3000"
    volumes:
      - /opt/prompt-site-builder/var/www/client-sites:/var/www/client-sites

  frontend:
    ports:
      - "5174:5173"

  caddy:
    ports:
      - "8080:80"
      - "8443:443"
      - "8443:443/udp"
    volumes:
      - /opt/prompt-site-builder/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/prompt-site-builder/var/www/client-sites:/var/www/client-sites:ro
